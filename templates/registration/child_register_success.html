{% extends "base.html" %}

{% block title %}注册成功 - 健康管理{% endblock %}

{% block extra_css %}
<style>
    .success-container {
        max-width: 600px;
        margin: 60px auto;
        padding: 50px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 4px 30px rgba(0,0,0,0.1);
        text-align: center;
    }
    .success-icon {
        font-size: 100px;
        margin-bottom: 20px;
    }
    .success-title {
        font-size: 32px;
        color: #4CAF50;
        margin-bottom: 10px;
    }
    .success-message {
        color: #666;
        font-size: 16px;
        margin-bottom: 30px;
    }
    .bind-code-box {
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        padding: 40px;
        border-radius: 16px;
        margin-bottom: 30px;
    }
    .bind-code-label {
        color: #aaa;
        font-size: 16px;
        margin-bottom: 15px;
    }
    .bind-code {
        font-size: 48px;
        font-weight: bold;
        color: #FFD700;
        letter-spacing: 10px;
        text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
    }
    .bind-code-hint {
        color: #aaa;
        font-size: 14px;
        margin-top: 20px;
    }
    .info-box {
        background: #fff3e0;
        border: 1px solid #ffb74d;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 30px;
        text-align: left;
    }
    .info-box h4 {
        color: #e65100;
        margin-bottom: 10px;
        font-size: 16px;
    }
    .info-box p {
        font-size: 14px;
        color: #333;
        line-height: 1.8;
        margin: 0;
    }
    .btn-login {
        display: inline-block;
        padding: 15px 50px;
        background: linear-gradient(135deg, #4CAF50, #81C784);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
        text-decoration: none;
    }
    .btn-login:hover {
        opacity: 0.9;
        transform: scale(1.02);
    }
</style>
{% endblock %}

{% block content %}
<div class="success-container">
    <div class="success-icon"><span class="icon icon-star"></span></div>
    <h1 class="success-title">注册成功！</h1>
    <p class="success-message">{{ child.nickname }} 的小勇士账号已创建</p>

    <div class="bind-code-box">
        <div class="bind-code-label"><span class="icon icon-star"></span> 家长绑定码</div>
        <div class="bind-code">{{ bind_code }}</div>
        <div class="bind-code-hint">将此码告诉家长，家长注册时输入此码即可关联</div>
    </div>

    <div class="info-box">
        <h4><span class="icon icon-star"></span> 重要提示</h4>
        <p>请妥善保存此绑定码！家长需要通过此码来关联您的账号。<br>如果忘记了绑定码，可以联系管理员重置。</p>
    </div>

    <a href="{% url 'login' %}" class="btn-login">前往登录</a>
</div>
{% endblock %}
