{% extends "base.html" %}

{% block title %}童视智圈{% endblock %}

{% block extra_css %}
<style>
.splash-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #a8c0ff 0%, #cfdef3 100%);
    cursor: pointer;
}
.splash-title {
    font-size: 80px;
    font-weight: 700;
    color: #5a6fa8;
    letter-spacing: 16px;
    text-shadow: 0 2px 10px rgba(90, 111, 168, 0.3);
    animation: breathe 3s ease-in-out infinite;
}
.splash-hint {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    color: #8898b8;
    font-size: 14px;
    letter-spacing: 2px;
    animation: pulse 2s infinite;
}
@keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.05); opacity: 1; }
}
@keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
}
</style>
{% endblock %}

{% block header %}{% endblock %}
{% block footer %}{% endblock %}

{% block content %}
<div class="splash-page" onclick="location.href='{% url 'login' %}'">
    <h1 class="splash-title">童视智圈</h1>
    <div class="splash-hint">点击任意位置进入</div>
</div>
{% endblock %}
