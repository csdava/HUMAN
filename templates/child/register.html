{% extends "base.html" %}

{% block title %}注册小勇士{% endblock %}

{% block extra_css %}
<style>
    .register-container {
        max-width: 500px;
        margin: 60px auto;
        padding: 40px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .register-title {
        text-align: center;
        font-size: 28px;
        margin-bottom: 10px;
    }
    .register-subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 30px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
    }
    .form-group input, .form-group select {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
    }
    .avatar-select {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
    }
    .avatar-option {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: 3px solid #ddd;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 28px;
        cursor: pointer;
        transition: all 0.3s;
    }
    .avatar-option:hover, .avatar-option.selected {
        border-color: #4CAF50;
        background: #f0f0f0;
    }
    .btn-register {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #4CAF50, #81C784);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        cursor: pointer;
        margin-top: 20px;
    }
    .btn-register:hover {
        opacity: 0.9;
    }
</style>
{% endblock %}

{% block content %}
<div class="register-container">
    <h1 class="register-title">创建小勇士</h1>
    <p class="register-subtitle">开始您的健康冒险之旅</p>

    <form method="POST" action="{% url 'register_child' %}">
        {% csrf_token %}
        <div class="form-group">
            <label>真实姓名</label>
            <input type="text" name="name" required placeholder="请输入真实姓名">
        </div>
        <div class="form-group">
            <label>昵称（显示名称）</label>
            <input type="text" name="nickname" required placeholder="请输入昵称">
        </div>
        <div class="form-group">
            <label>性别</label>
            <select name="gender" required>
                <option value="">请选择</option>
                <option value="M">男孩</option>
                <option value="F">女孩</option>
            </select>
        </div>
        <button type="submit" class="btn-register">开始冒险！</button>
    </form>
</div>
{% endblock %}
